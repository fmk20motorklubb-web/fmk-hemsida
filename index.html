<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FMK20FOI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BAS ===== */

html, body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:#0B2239;
color:white;
min-height:100%;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ===== HEADER ===== */

.header{
position:sticky;
top:0;
z-index:1000;
background:#07182a;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:20px;
}

.logo img{
height:36px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:500;
opacity:0.9;
transition:0.3s;
cursor:pointer;
}

.menu a:hover{
color:#FFC72C;
}

/* ===== HAMBURGER ===== */

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

.mobile-menu{
display:none;
flex-direction:column;
background:#07182a;
padding:20px;
gap:15px;
}

/* ===== HERO ===== */

.hero{
padding:90px 20px;
text-align:center;
background:
linear-gradient(rgba(11,34,57,0.92),rgba(11,34,57,0.95)),
url("https://lh3.googleusercontent.com/d/1aXQ0njh5TUbQMG_rPeyEUuTnJwuJUVhR");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.cta{
display:inline-block;
margin-top:30px;
background:#FFC72C;
color:black;
padding:16px 34px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.cta:hover{
transform:scale(1.05);
}

/* ===== CARDS ===== */

.cards{
margin:70px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:0.35s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card i{
font-size:34px;
color:#FFC72C;
margin-bottom:10px;
}

.card::after{
content:"→";
position:absolute;
right:20px;
bottom:20px;
}

/* ===== SECTIONS ===== */

.section{
display:none;
padding:70px 20px;
}

.section.active{
display:block;
}

.section-box{
max-width:1000px;
margin:auto;
background:#0a1f33;
padding:40px;
border-radius:12px;
}

.back{
margin-top:30px;
display:inline-block;
background:#FFC72C;
color:black;
padding:12px 28px;
border-radius:30px;
cursor:pointer;
}

/* ===== FOOTER ===== */

.footer{
margin-top:80px;
padding:60px 20px;
background:rgba(0,0,0,0.7);
text-align:center;
}

.footer img{
height:80px;
margin-bottom:20px;
}

.footer-links{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
max-width:700px;
margin:20px auto;
}

.footer-links a{
color:#FFC72C;
text-decoration:none;
font-weight:bold;
}

.footer-copy{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

@media(max-width:800px){

.menu{
display:none;
}

.hamburger{
display:block;
}

.mobile-menu.show{
display:flex;
}

}

</style>
</head>

<body>

<header class="header">

<div class="nav container">

<div class="logo">
<img src="https://lh3.googleusercontent.com/d/1CYuV6WLFcPUYGn_iG64HRh2gwwAiS2EL">
FMK20FOI
</div>

<div class="menu">
<a onclick="home()">Start</a>
<a onclick="show('slap')">Släp</a>
<a onclick="show('medlem')">Medlem</a>
<a onclick="show('verktyg')">Verktyg</a>
<a onclick="show('aktiviteter')">Aktiviteter</a>
<a onclick="show('kontakt')">Kontakt</a>
</div>

<div class="hamburger" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</div>

</div>

</header>

<div class="hero">

<h1>Försvarets Motorklubb Avdelning 20 FOI</h1>

<p>Säkerhet • Kunskap • Gemenskap</p>

<div class="cta" onclick="show('medlem')">
Bli medlem
</div>

</div>

<div class="container">

<div class="cards">

<div class="card" onclick="show('slap')">
<i class="fa-solid fa-truck"></i>
<h3>Boka släpvagn</h3>
</div>

<div class="card" onclick="show('verktyg')">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Verktyg</h3>
</div>

<div class="card" onclick="show('aktiviteter')">
<i class="fa-solid fa-calendar-days"></i>
<h3>Aktiviteter</h3>
</div>

<div class="card" onclick="show('kontakt')">
<i class="fa-solid fa-users"></i>
<h3>Kontakt</h3>
</div>

</div>

</div>

<script>

function show(page){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(page)?.classList.add("active")

window.scrollTo({top:0,behavior:'smooth'})

}

function home(){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

window.scrollTo({top:0,behavior:'smooth'})

}

function toggleMenu(){
document.getElementById("mobileMenu")?.classList.toggle("show")
}

</script>

</body>
</html>

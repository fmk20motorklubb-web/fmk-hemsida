<!DOCTYPE html>
<html lang="sv">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FMK20FOI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BAS ===== */

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0B2239;
color:white;
overflow-x:hidden;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ===== ANIMERAD BAKGRUND ===== */

.bg-tech{
position:fixed;
top:0;
left:0;
width:120%;
height:120%;

background-image:url("https://lh3.googleusercontent.com/d/1aXQ0njh5TUbQMG_rPeyEUuTnJwuJUVhR");

background-size:cover;
background-position:center;

opacity:0.22;

animation:techDrift 70s linear infinite;

z-index:-5;
}

.bg-logo{
position:fixed;
top:50%;
left:50%;

width:950px;
height:950px;

background-image:url("https://lh3.googleusercontent.com/d/1naPMDGac67RmHFN-jhNuGI8-LmYt-bB4");

background-size:contain;
background-repeat:no-repeat;
background-position:center;

transform:translate(-50%,-50%);

opacity:0.12;

animation:logoGlow 10s ease-in-out infinite;

z-index:-4;
}

.bg-overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(11,34,57,0.88);

z-index:-3;
}

.bg-lines{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:
linear-gradient(90deg, transparent 48%, rgba(255,199,44,0.08) 50%, transparent 52%),
linear-gradient(0deg, transparent 48%, rgba(255,199,44,0.06) 50%, transparent 52%);

background-size:120px 120px;

animation:gridShift 35s linear infinite;

z-index:-2;
}

/* ===== HEADER ===== */

.header{
position:sticky;
top:0;
z-index:1000;
background:#07182a;
box-shadow:0 5px 25px rgba(0,0,0,0.5);
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.logo{
display:flex;
align-items:center;
gap:12px;
font-weight:bold;
font-size:20px;
}

.logo img{
height:38px;
}

.menu{
display:flex;
gap:26px;
}

.menu a{
color:white;
text-decoration:none;
cursor:pointer;
}

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

.mobile-menu{
display:none;
flex-direction:column;
background:#07182a;
padding:20px;
gap:15px;
}

/* ===== HERO ===== */

.hero{
padding:110px 20px;
text-align:center;
}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.cta{
display:inline-block;
margin-top:30px;
background:#FFC72C;
color:black;
padding:16px 36px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
}

/* ===== CARDS ===== */

.cards{
margin:80px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:30px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:0.35s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 35px rgba(0,0,0,0.6);
}

.card i{
font-size:36px;
color:#FFC72C;
margin-bottom:10px;
}

/* ===== SECTIONS ===== */

.section{
display:none;
padding:80px 20px;
}

.section.active{
display:block;
}

.section-box{
max-width:1000px;
margin:auto;
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:12px;
}

.back{
margin-top:30px;
display:inline-block;
background:#FFC72C;
color:black;
padding:12px 28px;
border-radius:30px;
cursor:pointer;
}

/* ===== FOOTER ===== */

.footer{
margin-top:80px;
padding:60px 20px;
background:rgba(0,0,0,0.75);
text-align:center;
}

.footer img{
height:85px;
margin-bottom:20px;
}

/* ===== ANIMATIONER ===== */

@keyframes techDrift{

0%{transform:translate(0,0) scale(1);}
50%{transform:translate(-3%,-2%) scale(1.03);}
100%{transform:translate(0,0) scale(1);}

}

@keyframes logoGlow{

0%{transform:translate(-50%,-50%) scale(1);opacity:0.10;}
50%{transform:translate(-50%,-50%) scale(1.06);opacity:0.18;}
100%{transform:translate(-50%,-50%) scale(1);opacity:0.10;}

}

@keyframes gridShift{

0%{background-position:0 0;}
100%{background-position:120px 120px;}

}

/* ===== RESPONSIVE ===== */

@media(max-width:800px){

.menu{
display:none;
}

.hamburger{
display:block;
}

.mobile-menu.show{
display:flex;
}

}

</style>
</head>

<body>

<div class="bg-tech"></div>
<div class="bg-logo"></div>
<div class="bg-overlay"></div>
<div class="bg-lines"></div>

<header class="header">

<div class="nav container">

<div class="logo">
FMK20FOI
</div>

<div class="menu">
<a onclick="home()">Start</a>
<a onclick="show('slap')">Släp</a>
<a onclick="show('medlem')">Medlem</a>
<a onclick="show('verktyg')">Verktyg</a>
<a onclick="show('aktiviteter')">Aktiviteter</a>
<a onclick="show('kontakt')">Kontakt</a>
</div>

<div class="hamburger" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">
<a onclick="show('slap')">Släp</a>
<a onclick="show('medlem')">Medlem</a>
<a onclick="show('verktyg')">Verktyg</a>
<a onclick="show('aktiviteter')">Aktiviteter</a>
<a onclick="show('kontakt')">Kontakt</a>
</div>

</header>

<div class="hero">

<h1>Försvarets Motorklubb Avdelning 20 FOI</h1>

<p>Säkerhet • Kunskap • Gemenskap</p>

<div class="cta" onclick="show('medlem')">
Bli medlem
</div>

</div>

<div class="container">

<div class="cards">

<div class="card" onclick="show('slap')">
<i class="fa-solid fa-truck"></i>
<h3>Boka släpvagn</h3>
</div>

<div class="card" onclick="show('verktyg')">
<i class="fa-solid fa-screwdriver-wrench"></i>
<h3>Verktyg</h3>
</div>

<div class="card" onclick="show('aktiviteter')">
<i class="fa-solid fa-calendar-days"></i>
<h3>Aktiviteter</h3>
</div>

<div class="card" onclick="show('kontakt')">
<i class="fa-solid fa-users"></i>
<h3>Kontakt</h3>
</div>

</div>

</div>

<script>

function show(page){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

document.getElementById(page)?.classList.add("active")

window.scrollTo({top:0,behavior:'smooth'})
}

function home(){

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active")
})

window.scrollTo({top:0,behavior:'smooth'})
}

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show")
}

</script>

</body>
</html>

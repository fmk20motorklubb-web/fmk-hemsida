```html
<!DOCTYPE html>
<html lang="sv">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FMK Avdelning 20 FOI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== GLOBAL ===== */

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#0B2239;
color:white;
overflow-x:hidden;
}

/* ===== HEADER ===== */

.header{

position:sticky;
top:0;
z-index:1000;

background:#07182a;
box-shadow:0 4px 15px rgba(0,0,0,0.4);

}

.nav{

max-width:1100px;
margin:auto;

display:flex;
align-items:center;
justify-content:space-between;

padding:14px 20px;

}

.logo{
font-weight:bold;
font-size:18px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:500;
cursor:pointer;
opacity:0.9;
}

.menu a:hover{
color:#FFC72C;
}

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

/* ===== MOBILE MENU ===== */

.mobile-menu{
display:none;
flex-direction:column;
background:#07182a;
padding:20px;
gap:15px;
}

.mobile-menu a{
cursor:pointer;
}

/* ===== HERO ===== */

.hero{

background:
linear-gradient(rgba(11,34,57,0.9),rgba(11,34,57,0.95)),
url("https://lh3.googleusercontent.com/d/1aXQ0njh5TUbQMG_rPeyEUuTnJwuJUVhR");

background-size:cover;
background-position:center;

padding:110px 20px;
text-align:center;

}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.cta{

display:inline-block;
margin-top:25px;

background:#FFC72C;
color:black;

padding:14px 30px;
border-radius:40px;

font-weight:bold;

cursor:pointer;
text-decoration:none;

}

/* ===== NAV BOXES ===== */

.container{
max-width:1100px;
margin:auto;
padding:0 20px;
}

.cards{

margin:70px auto;

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:30px;

}

.card{

background:rgba(255,255,255,0.08);
padding:30px;

border-radius:14px;
border:1px solid rgba(255,255,255,0.15);

cursor:pointer;
transition:0.3s;

text-align:center;

}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.card i{
font-size:32px;
color:#FFC72C;
margin-bottom:10px;
}

/* ===== SECTIONS ===== */

.section{
display:none;
padding:70px 0;
opacity:0;
transform:translateY(10px);
transition:0.35s;
}

.section.active{
display:block;
opacity:1;
transform:translateY(0);
}

.back{

display:inline-block;
margin-bottom:30px;

background:#FFC72C;
color:black;

padding:10px 24px;
border-radius:30px;

font-weight:bold;
cursor:pointer;

}

/* ===== GRIDS ===== */

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));

gap:30px;
margin-bottom:50px;

}

.box{

background:rgba(255,255,255,0.08);

padding:25px;
border-radius:12px;

}

/* ===== CONTENT BOXES ===== */

.content-box{

background:rgba(0,0,0,0.35);

padding:30px;
border-radius:12px;

margin-bottom:50px;

}

iframe{
width:100%;
border:none;
border-radius:10px;
}

/* ===== FOOTER ===== */

.footer{

margin-top:80px;

padding:60px 20px;

background:#07182a;
text-align:center;

}

.footer img{
height:70px;
margin-bottom:20px;
}

.footer-links{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(150px,1fr));

gap:10px;
max-width:600px;
margin:auto;

}

.footer-links a{
color:#FFC72C;
text-decoration:none;
font-weight:bold;
cursor:pointer;
}

/* ===== MOBILE ===== */

@media(max-width:800px){

.menu{
display:none;
}

.hamburger{
display:block;
}

.mobile-menu.show{
display:flex;
}

.hero{
padding:70px 20px;
}

.hero h1{
font-size:28px;
}

.hero p{
font-size:16px;
}

.cards{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

iframe{
height:600px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<div class="nav">

<div class="logo">FMK20FOI</div>

<div class="menu">

<a onclick="goHome()">Start</a>
<a onclick="showPage('trailer')">Släp</a>
<a onclick="showPage('member')">Medlem</a>
<a onclick="showPage('activity')">Aktiviteter</a>
<a onclick="showPage('contact')">Kontakt</a>

</div>

<div class="hamburger" onclick="toggleMenu()">
<i class="fa-solid fa-bars"></i>
</div>

</div>

<div class="mobile-menu" id="mobileMenu">

<a onclick="goHome()">Start</a>
<a onclick="showPage('trailer')">Släp</a>
<a onclick="showPage('member')">Medlem</a>
<a onclick="showPage('activity')">Aktiviteter</a>
<a onclick="showPage('contact')">Kontakt</a>

</div>

</div>

<!-- HERO -->

<div class="hero">

<h1>Försvarets Motorklubb</h1>
<p>Avdelning 20 FOI</p>

<a class="cta" onclick="showPage('member')">Bli medlem</a>

</div>

<div class="container">

<!-- START -->

<div id="home">

<div class="cards">

<div class="card" onclick="showPage('trailer')">
<i class="fa-solid fa-truck"></i>
<h3>Boka släpvagn</h3>
</div>

<div class="card" onclick="showPage('member')">
<i class="fa-solid fa-users"></i>
<h3>Bli medlem</h3>
</div>

<div class="card" onclick="showPage('activity')">
<i class="fa-solid fa-calendar"></i>
<h3>Aktiviteter</h3>
</div>

<div class="card" onclick="showPage('contact')">
<i class="fa-solid fa-envelope"></i>
<h3>Kontakt</h3>
</div>

</div>

</div>

<!-- (alla dina undersidor fortsätter exakt som i version 4) -->

</div>

<!-- FOOTER -->

<div class="footer">

<img src="https://drive.google.com/uc?export=view&id=1naPMDGac67RmHFN-jhNuGI8-LmYt-bB4">

<div class="footer-links">

<a onclick="goHome()">Startsida</a>
<a onclick="showPage('trailer')">Släp</a>
<a onclick="showPage('member')">Medlem</a>
<a onclick="showPage('activity')">Aktiviteter</a>
<a onclick="showPage('contact')">Kontakt</a>

</div>

</div>

<script>

function showPage(id){

document.getElementById("home").style.display="none";

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

window.scrollTo({top:0,behavior:"smooth"});

closeMenu();

}

function goHome(){

document.getElementById("home").style.display="block";

document.querySelectorAll(".section").forEach(s=>{
s.classList.remove("active");
});

window.scrollTo({top:0,behavior:"smooth"});

closeMenu();

}

function toggleMenu(){
document.getElementById("mobileMenu").classList.toggle("show");
}

function closeMenu(){
document.getElementById("mobileMenu").classList.remove("show");
}

</script>

</body>
</html>
```

<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FMK20FOI</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ===== BAS ===== */

html,body{
margin:0;
padding:0;
font-family:'Segoe UI',sans-serif;
background:#0B2239;
color:white;
min-height:100%;
}

/* extra skydd mot Google Sites rutnät */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#0B2239;
z-index:-10;
}

.container{
max-width:1200px;
margin:auto;
padding:0 20px;
}

/* ===== HEADER ===== */

.header{
position:sticky;
top:0;
z-index:1000;
background:#07182a;
box-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.nav{
display:flex;
align-items:center;
justify-content:space-between;
padding:14px 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:20px;
}

.logo img{
height:36px;
}

.menu{
display:flex;
gap:25px;
}

.menu a{
color:white;
text-decoration:none;
font-weight:500;
opacity:0.9;
transition:0.3s;
cursor:pointer;
}

.menu a:hover{
color:#FFC72C;
}

/* ===== HAMBURGER ===== */

.hamburger{
display:none;
font-size:24px;
cursor:pointer;
}

.mobile-menu{
display:none;
flex-direction:column;
background:#07182a;
padding:20px;
gap:15px;
}

.mobile-menu a{
cursor:pointer;
}

/* ===== HERO ===== */

.hero{
padding:90px 20px;
text-align:center;
background:
linear-gradient(rgba(11,34,57,0.92),rgba(11,34,57,0.95)),
url("https://lh3.googleusercontent.com/d/1aXQ0njh5TUbQMG_rPeyEUuTnJwuJUVhR");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:46px;
margin-bottom:10px;
}

.hero p{
font-size:20px;
opacity:0.9;
}

.cta{
display:inline-block;
margin-top:30px;
background:#FFC72C;
color:black;
padding:16px 34px;
border-radius:40px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.cta:hover{
transform:scale(1.05);
box-shadow:0 8px 25px rgba(0,0,0,0.4);
}

/* ===== KORT ===== */

.cards{
margin:70px auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.08);
padding:30px;
border-radius:14px;
border:1px solid rgba(255,255,255,0.15);
cursor:pointer;
transition:0.35s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}

.card i{
font-size:34px;
color:#FFC72C;
margin-bottom:10px;
transition:0.3s;
}

.card:hover i{
transform:scale(1.2);
}

.card::after{
content:"→";
position:absolute;
right:20px;
bottom:20px;
font-size:20px;
opacity:0.8;
}

/* ===== SECTIONS ===== */

.section{
display:none;
padding:70px 20px;
animation:fade 0.4s;
}

.section.active{
display:block;
}

.section-box{
max-width:1000px;
margin:auto;
background:rgba(0,0,0,0.45);
padding:40px;
border-radius:12px;
}

iframe{
border:none;
border-radius:10px;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;transform:translateY(0);}
}

.back{
margin-top:30px;
display:inline-block;
background:#FFC72C;
color:black;
padding:12px 28px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

/* ===== FOOTER ===== */

.footer{
margin-top:80px;
padding:60px 20px;
background:rgba(0,0,0,0.7);
text-align:center;
}

.footer img{
height:80px;
margin-bottom:20px;
}

.footer-links{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
max-width:700px;
margin:20px auto;
}

.footer-links a{
color:#FFC72C;
text-decoration:none;
font-weight:bold;
}

.footer-copy{
margin-top:20px;
font-size:12px;
opacity:0.6;
}

/* ===== RESPONSIVE ===== */

@media(max-width:800px){

.menu{
display:none;
}

.hamburger{
display:block;
}

.mobile-menu.show{
display:flex;
}

}

</style>
</head>

<body>
